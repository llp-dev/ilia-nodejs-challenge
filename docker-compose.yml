services:
  wallet-db:
    image: docker.io/library/postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet-api:
    build:
      context: ./wallet
      dockerfile: Dockerfile
    image: wallet-api:latest
    restart: unless-stopped
    environment:
      WALLET_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@wallet-db:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      WALLET_PORT: ${WALLET_PORT:-3001}
      WALLET_RELEASE: ${WALLET_RELEASE:-true}
      WALLET_JWT_SECRET: ${WALLET_JWT_SECRET:-ILIACHALLENGE}
      WALLET_JWT_INTERNAL_SECRET: ${WALLET_JWT_INTERNAL_SECRET:-ILIACHALLENGE_INTERNAL}
    ports:
      - "${WALLET_PORT:-3001}:${WALLET_PORT:-3001}"
    depends_on:
      wallet-db:
        condition: service_healthy

volumes:
  pgdata:
